# megaraid_sas otherwise requests managed per-CPU MSI-X affinities across
# every online NUMA node.  Managed vectors reject /proc/irq affinity writes.
# Leave MSI-X enabled, but make its vectors administrator-affine so the
# companion goblin-benchmark-irqs.service can confine them to PCI-local CPUs.
options megaraid_sas smp_affinity_enable=0
